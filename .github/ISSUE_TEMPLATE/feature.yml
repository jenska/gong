name: Feature request
description: Suggest a gameplay, developer-experience, or platform improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What would this improve for players or contributors?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior and any relevant technical design.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would like to work on this feature.
