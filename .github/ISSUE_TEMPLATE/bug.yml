name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the game with …
        2. Select …
        3. Observe …
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: go version go1.26.3 darwin/arm64
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Browser / WebAssembly
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add relevant output or screenshots. Do not include secrets.
