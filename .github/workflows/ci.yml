name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc6-dev \
            libglu1-mesa-dev \
            libgl1-mesa-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxxf86vm-dev \
            libasound2-dev \
            pkg-config

      - name: Verify formatting
        run: test -z "$(gofmt -l main.go game/*.go)"

      - name: Run tests
        run: go test -race ./...

      - name: Run vet
        run: go vet ./...

      - name: Build desktop game
        run: go build ./...

      - name: Build browser game
        run: make web
